name: tagpr
on:
  push:
    branches: ["main"]
jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
    - uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
